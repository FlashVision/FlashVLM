model_name: flashvlm-qwen-vl-7b
architecture: qwen_vl

vision:
  encoder_name: openai/clip-vit-large-patch14-336
  image_size: 448
  patch_size: 14
  hidden_size: 1024
  num_layers: 24
  num_heads: 16
  freeze: true
  use_checkpoint: false

projector:
  type: qformer
  input_dim: 1024
  output_dim: 4096
  num_layers: 2
  num_query_tokens: 256
  dropout: 0.0

language:
  model_name: Qwen/Qwen-VL-Chat
  hidden_size: 4096
  num_layers: 32
  num_heads: 32
  vocab_size: 151936
  max_length: 2048
  freeze: false
  use_flash_attention: true

lora:
  enabled: true
  rank: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - c_attn
    - c_proj
    - w1
    - w2
  use_qlora: false
  bits: 4

training:
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler: cosine
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  deepspeed: null
  output_dir: outputs/qwen-vl-7b
  save_steps: 500
  eval_steps: 100
  logging_steps: 10
  dataloader_num_workers: 4
  seed: 42

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_k: 50
  top_p: 0.9
  repetition_penalty: 1.1
  do_sample: true
  num_beams: 1
  length_penalty: 1.0
  early_stopping: false

data:
  train_data: null
  val_data: null
  test_data: null
  image_dir: null
  max_length: 2048
  image_size: 448
  augmentation: true
