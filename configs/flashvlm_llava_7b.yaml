model_name: flashvlm-llava-7b
architecture: llava

vision:
  encoder_name: openai/clip-vit-large-patch14-336
  image_size: 336
  patch_size: 14
  hidden_size: 1024
  num_layers: 24
  num_heads: 16
  freeze: true
  use_checkpoint: false

projector:
  type: mlp
  input_dim: 1024
  output_dim: 4096
  num_layers: 2
  num_query_tokens: 64
  dropout: 0.0

language:
  model_name: meta-llama/Llama-2-7b-hf
  hidden_size: 4096
  num_layers: 32
  num_heads: 32
  vocab_size: 32000
  max_length: 2048
  freeze: false
  use_flash_attention: true

lora:
  enabled: false
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
  use_qlora: false
  bits: 4

training:
  epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler: cosine
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  deepspeed: null
  output_dir: outputs/llava-7b
  save_steps: 500
  eval_steps: 100
  logging_steps: 10
  dataloader_num_workers: 4
  seed: 42

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_k: 50
  top_p: 0.9
  repetition_penalty: 1.1
  do_sample: true
  num_beams: 1
  length_penalty: 1.0
  early_stopping: false

data:
  train_data: null
  val_data: null
  test_data: null
  image_dir: null
  max_length: 2048
  image_size: 336
  augmentation: true
