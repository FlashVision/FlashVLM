model_name: flashvlm-phi-vision-4b
architecture: phi_vision

vision:
  encoder_name: google/siglip-so400m-patch14-384
  image_size: 384
  patch_size: 14
  hidden_size: 1152
  num_layers: 27
  num_heads: 16
  freeze: true
  use_checkpoint: false

projector:
  type: mlp
  input_dim: 1152
  output_dim: 2560
  num_layers: 2
  num_query_tokens: 64
  dropout: 0.0

language:
  model_name: microsoft/phi-2
  hidden_size: 2560
  num_layers: 32
  num_heads: 32
  vocab_size: 51200
  max_length: 2048
  freeze: false
  use_flash_attention: true

lora:
  enabled: true
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
  use_qlora: true
  bits: 4

training:
  epochs: 5
  batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler: cosine
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  deepspeed: null
  output_dir: outputs/phi-vision-4b
  save_steps: 1000
  eval_steps: 200
  logging_steps: 10
  dataloader_num_workers: 4
  seed: 42

generation:
  max_new_tokens: 256
  temperature: 0.7
  top_k: 50
  top_p: 0.9
  repetition_penalty: 1.1
  do_sample: true
  num_beams: 1
  length_penalty: 1.0
  early_stopping: false

data:
  train_data: null
  val_data: null
  test_data: null
  image_dir: null
  max_length: 2048
  image_size: 384
  augmentation: true
